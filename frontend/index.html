<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliTutor AI | Personalized Learning Companion</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-blob {
            filter: blur(120px);
            position: absolute;
            z-index: -1;
            border-radius: 9999px;
        }
        .input-glow:focus-within {
            box-shadow: 0 0 20px rgba(128, 131, 255, 0.25);
            border-bottom-color: #2fd9f4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #131b2e 0%, #0b1326 100%);
        }
        .score-glow {
            box-shadow: 0 0 60px -15px rgba(78, 222, 163, 0.2);
        }
        .glass-nav {
            backdrop-filter: blur(12px);
            background-color: rgba(11, 19, 38, 0.8);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
  </head>
  <body class="bg-surface-container-lowest font-body text-on-surface min-h-screen relative">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
